spring.application.name=gateway
server.port=8088

eureka.client.service-url.defaultZone=http://127.0.0.1:8761/eureka/

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ????????? gateway??????? backend
spring.cloud.gateway.routes[0].id=backend-api
spring.cloud.gateway.routes[0].uri=lb://backend
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/**,/websocket/**

# CORS????????????
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*

spring.redis.host=127.0.0.1
spring.redis.port=6379

# filters
spring.cloud.gateway.routes[0].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[0].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.burstCapacity=40
