spring.application.name=backend

server.port=3000
spring.datasource.username=
spring.datasource.password=
spring.datasource.url=jdbc:mysql://localhost:3306/kob?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jackson.time-zone=GMT+8
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

aliyun.oss.endpoint=
aliyun.oss.accessKeyId=
aliyun.oss.accessKeySecret=
aliyun.oss.bucketName=

spring.mail.host=smtp.qq.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

eureka.client.service-url.defaultZone=http://127.0.0.1:8761/eureka/

internal.token=

feign.circuitbreaker.enabled=true
feign.client.config.default.connectTimeout=1000
feign.client.config.default.readTimeout=2000


resilience4j.circuitbreaker.instances.matchingSystemClient.failureRateThreshold=50

resilience4j.circuitbreaker.instances.matchingSystemClient.minimumNumberOfCalls=10

resilience4j.circuitbreaker.instances.matchingSystemClient.slidingWindowSize=20
resilience4j.circuitbreaker.instances.matchingSystemClient.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.botRunningSystemClient.failureRateThreshold=50
resilience4j.circuitbreaker.instances.botRunningSystemClient.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.botRunningSystemClient.slidingWindowSize=20
resilience4j.circuitbreaker.instances..botRunningSystemClient.waitDurationInOpenState=10s


